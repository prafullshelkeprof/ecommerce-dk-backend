services:
  - type: web
    name: ecommerce-dk-backend
    runtime: node
    region: frankfurt
    plan: free
    branch: master
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production

      # Pin to Node 20 LTS – Medusa is NOT compatible with Node 26
      - key: NODE_VERSION
        value: "20.19.1"

      # ── Secrets – set manually in Render dashboard ────────────────────────
      - key: DATABASE_URL
        sync: false

      - key: JWT_SECRET
        generateValue: true

      - key: COOKIE_SECRET
        generateValue: true

      # ── CORS ──────────────────────────────────────────────────────────────
      - key: STORE_CORS
        value: https://ecommerce-dk-dmrb.vercel.app

      - key: ADMIN_CORS
        value: https://ecommerce-dk-dmrb.vercel.app

      - key: AUTH_CORS
        value: https://ecommerce-dk-dmrb.vercel.app
